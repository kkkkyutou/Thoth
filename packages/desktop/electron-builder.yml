npmRebuild: false
appId: sh.thoth.desktop
productName: Thoth
executableName: Thoth
afterPack: ./scripts/after-pack.cjs
afterSign: ./scripts/after-sign.cjs
directories:
  output: release
files:
  - dist/**/*
  - "!**/*.map"
  - "!node_modules/@thoth/*/src/**"
  - "!node_modules/@thoth/**/*.test.*"
  - "!node_modules/@thoth/**/*.spec.*"
  - "!node_modules/@thoth/daemon/dist/server/web-ui/**"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@thoth/daemon/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
publish:
  provider: github
  owner: SeeleAI
  repo: Thoth
mac:
  artifactName: "Thoth-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    - from: bin/thoth
      to: bin/thoth
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "Thoth-${version}-${arch}.${ext}"
  maintainer: "SeeleAI <viceyzy@foxmail.com>"
  vendor: "Thoth"
  extraResources:
    - from: bin/thoth
      to: bin/thoth
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
appImage:
  # Keep the AppImage filename stable across versions (no ${version}) so
  # electron-updater overwrites the file in place instead of renaming it to a new
  # versioned path. A rename orphans the old binary, breaks desktop shortcuts, and
  # dangles the ~/.local/bin/thoth CLI symlink, which points at $APPIMAGE. The
  # version stays discoverable via the release tag and the in-app version.
  artifactName: "Thoth-${arch}.${ext}"
win:
  artifactName: "Thoth-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/thoth.cmd
      to: bin/thoth.cmd
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
